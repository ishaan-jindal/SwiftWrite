name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "beta"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Prepare .env
        run: |
          if [ -n "${{ secrets.ENV_FILE }}" ]; then
            echo "${{ secrets.ENV_FILE }}" > .env
          else
            cp example.env .env
          fi

      - name: Prepare google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 --decode > android/app/google-services.json
          elif [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            printf "%s" "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json
          elif [ -f android/app/google-services.json ]; then
            echo "Using repository google-services.json"
          else
            echo "Missing GOOGLE_SERVICES_JSON or GOOGLE_SERVICES_JSON_B64 secret"
            exit 1
          fi

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: swiftwrite-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
